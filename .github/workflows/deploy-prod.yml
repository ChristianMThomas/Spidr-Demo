name: Deploy — Production Landing (spidrapp.com)

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    defaults:
      run:
        working-directory: spidr-beta/spidr-landing
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: spidr-beta/spidr-landing/package-lock.json
      - run: npm ci
      - run: npm run build
      - name: Deploy to GoDaddy (production)
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.GODADDY_FTP_HOST }}
          username: ${{ secrets.GODADDY_FTP_USER }}
          password: ${{ secrets.GODADDY_FTP_PASSWORD }}
          local-dir: spidr-beta/spidr-landing/dist/
          server-dir: /public_html/
